    function exportDrillCSV() {
        const body = document.getElementById('drill-body');
        const tables = body.querySelectorAll('table.drill-table');
        if (!tables.length) return;
        const rows = [];
        const stats = body.querySelectorAll('.drill-stats .drill-stat');
        if (stats.length) {
            const labels = [], values = [];
            stats.forEach(s => {
                labels.push('"' + (s.querySelector('.ds-lbl')?.textContent.trim() || '').replace(/"/g, '""') + '"');
                values.push('"' + (s.querySelector('.ds-val')?.textContent.trim() || '').replace(/"/g, '""') + '"');
            });
            rows.push(labels.join(';'));
            rows.push(values.join(';'));
            rows.push('');
        }
        tables.forEach((table, idx) => {
            if (idx > 0) rows.push('');
            const headerCells = table.querySelectorAll('thead th');
            if (headerCells.length) {
                rows.push(Array.from(headerCells).map(th => '"' + th.textContent.trim().replace(/"/g, '""') + '"').join(';'));
            }
            table.querySelectorAll('tbody tr').forEach(tr => {
                const cells = tr.querySelectorAll('td');
                rows.push(Array.from(cells).map(td => '"' + td.textContent.trim().replace(/"/g, '""') + '"').join(';'));
            });
        });
        const title = document.getElementById('drill-title').textContent || 'drill';
        const filename = 'drilldown_' + title.replace(/[^a-zA-Z0-9]/g, '_').toLowerCase() + '.csv';
        downloadCSV(rows.join('\n'), filename);
    }

    // ========== MULTI-YEAR EXPORT ==========
    async function exportCompaniesMultiyearCSV() {
        if (!currentData || !currentData.metadata) return;
        const m = currentData.metadata;
        const statusEl = document.getElementById('statusText');
        statusEl.textContent = 'Gerando export multi-ano...';

        try {
            const p = buildPayload();
            const payload = {
                sector: p.sector,
                industries: p.industries || [],
                filters: { min_ev_usd: p.filters?.min_ev_usd || 0 }
            };
            const resp = await fetch('/api/estudoanloc/companies_multiyear', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await resp.json();
            if (!data.success) { statusEl.textContent = 'Erro: ' + (data.error || ''); return; }

            const years = data.years || [];
            const companies = data.companies || [];
            if (!companies.length) { statusEl.textContent = 'Nenhuma empresa para exportar.'; return; }

            // Build headers
            const headers = ['Ticker', 'Indústria', 'País', 'Região', 'Moeda'];
            for (const yr of years) {
                headers.push(`Receita_${yr}`, `EBITDA_${yr}`, `FCF_${yr}`, `EV_${yr}`,
                    `EV/EBITDA_${yr}`, `EV/Vendas_${yr}`, `FCF/Vendas_${yr}`, `FCF/EBITDA_${yr}`);
            }

            let csv = headers.join(';') + '\n';
            for (const c of companies) {
                const row = [c.ticker, c.industry, c.country, c.region, c.currency];
                for (const yr of years) {
                    const y = (c.years || {})[yr] || {};
                    row.push(
                        y.revenue != null ? y.revenue : '',
                        y.ebitda != null ? y.ebitda : '',
                        y.fcf != null ? y.fcf : '',
                        y.ev != null ? y.ev : '',
                        y.ev_ebitda != null ? y.ev_ebitda : '',
                        y.ev_revenue != null ? y.ev_revenue : '',
                        y.fcf_revenue != null ? y.fcf_revenue : '',
                        y.fcf_ebitda != null ? y.fcf_ebitda : ''
                    );
                }
                csv += row.map(v => v != null ? String(v).replace(/;/g, ',') : '').join(';') + '\n';
            }

            downloadCSV(csv, `estudoanloc_multianos_${m.sector}_${years[0]}-${years[years.length-1]}.csv`);
            statusEl.textContent = `Exportado: ${companies.length} empresas × ${years.length} anos`;
        } catch (err) {
            statusEl.textContent = 'Erro export: ' + err.message;
        }
    }

    // ========== TOOLTIP POSITIONING ==========
    document.addEventListener('mouseover', function(e) {
        const tip = e.target.closest('.ba-tip');
        if (!tip) return;
        const box = tip.querySelector('.ba-tip-box');
        if (!box) return;
        const rect = tip.getBoundingClientRect();
        box.style.display = 'block';
        box.style.left = rect.left + 'px';
        box.style.top = (rect.bottom + 6) + 'px';
    });
    document.addEventListener('mouseout', function(e) {
        const tip = e.target.closest('.ba-tip');
        if (!tip) return;
        const box = tip.querySelector('.ba-tip-box');
        if (box) box.style.display = 'none';
    });

    // ========== START ==========
    init();
    </script>
</body>
</html>
